baseURL = 'https://cdsap.github.io/Telltale/'
languageCode = 'en-us'
ignoreLogs = ['warning-goldmark-raw-html']
# Used in <title>, RSS, and JSON feeds. Nav logo text is params.label.text below.
title = 'Telltale — Gradle build experiment results'
theme = 'PaperMod'
enableRobotsTXT = true

[taxonomies]
  tag = "tags"
  cache = "caches"
  component = "components"

# Pagination settings
[pagination]
  pagerSize = 10

# Custom output formats
[outputFormats]
  [outputFormats.ExperimentsJSON]
    mediaType = "application/json"
    baseName = "experiments"
    isPlainText = true
    notAlternative = true

# Define outputs per section
[outputs]
  home = ["HTML", "RSS", "ExperimentsJSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[params]
  description = "Experimentation Framework for Gradle Builds. Published A/B Gradle build comparisons, metrics, and reports."
  # PaperMod author partial expects a string (not [params.author] map) for <meta name="author">.
  author = "Telltale"
  [params.label]
    text = "Telltale"
  images = ["og-image.png"]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  mainSections = ["posts"]
  # PaperMod bundles assets/css/extended/*.css into the main stylesheet (not assets/css/extended.css).
  assets = {customCSS = ["css/extended/site.css"]}

[params.homeInfoParams]
  Title = "Telltale"
  Content = "A framework for running and analyzing Gradle build experiments"

[menu]
  [[menu.main]]
    identifier = "expereiments"
    name = "Experiments"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "info"
    name = "Info"
    url = "/info/"
    weight = 20
  [[menu.main]]
    identifier = "experiment-data"
    name = "Experiment data"
    url = "/experiment-data/"
    weight = 25
