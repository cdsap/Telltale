baseURL = 'https://cdsap.github.io/Telltale/'
languageCode = 'en-us'
title = 'Telltale'
theme = 'PaperMod'
enableRobotsTXT = true

# Pagination settings
[pagination]
  pagerSize = 10

# Custom output formats
[outputFormats]
  [outputFormats.ExperimentsJSON]
    mediaType = "application/json"
    baseName = "experiments"
    isPlainText = true
    notAlternative = true

# Define outputs per section
[outputs]
  home = ["HTML", "RSS", "ExperimentsJSON"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]

[params]
  description = "Experimentation Framework for Gradle Builds"
  images = ["og-image.png"]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  mainSections = ["posts"]
  assets = {customCSS = ["css/extended.css"]}

[params.homeInfoParams]
  Title = "Telltale 🔍"
  Content = "A framework for running and analyzing Gradle build experiments"

[menu]
  [[menu.main]]
    identifier = "expereiments"
    name = "Experiments"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "info"
    name = "Info"
    url = "/info/"
    weight = 20
